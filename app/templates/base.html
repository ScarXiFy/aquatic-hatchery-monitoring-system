<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Aquatic Hatchery Monitoring System{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body class="{% block body_class %}dashboard-body{% endblock %}">
  <header class="topbar">
    <a class="brand" href="{{ url_for('main.index') }}">
      <span>Aquatic Hatchery</span>
      <strong>Monitoring System</strong>
    </a>

    <nav class="nav" aria-label="Primary navigation">
      <a href="{{ url_for('main.index') }}" class="{% if request.endpoint == 'main.index' %}active{% endif %}">Home</a>
      <a href="{{ url_for('main.graph') }}" class="{% if request.endpoint == 'main.graph' %}active{% endif %}">View Graph</a>
    </nav>

    <div class="topbar-actions">
      <span class="status-pill status-optimal">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M3 12h4l3-7 4 14 3-7h4" />
        </svg>
        Optimal
      </span>
      <span class="status-pill status-rpi" id="socket-status" data-connected-label="RPi Connected" data-disconnected-label="RPi Disconnected">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M5 12.5a10 10 0 0 1 14 0" />
          <path d="M8.5 16a5 5 0 0 1 7 0" />
          <path d="M12 19h.01" />
        </svg>
        <span data-socket-status-label>RPi Connected</span>
      </span>
      <time id="current-date-time" datetime="">--</time>
      <button class="icon-button" type="button" aria-label="View notifications">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
      </button>
      <button class="user-button" type="button" aria-label="Open user menu">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M20 21a8 8 0 0 0-16 0" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </button>
    </div>
  </header>

  <main class="page-shell">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
