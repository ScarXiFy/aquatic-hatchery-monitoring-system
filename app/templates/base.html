<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Aquatic Hatchery Monitoring System{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark"></span>
      <div>
        <strong>Hatchery</strong>
        <small>Monitoring</small>
      </div>
    </div>
    <nav class="nav">
      <a href="{{ url_for('main.index') }}" class="{% if request.endpoint == 'main.index' %}active{% endif %}">Home</a>
      <a href="{{ url_for('main.graph') }}" class="{% if request.endpoint == 'main.graph' %}active{% endif %}">View Graph</a>
    </nav>
  </aside>

  <main class="page-shell">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
  <script src="{{ url_for('static', filename='js/socket.js') }}"></script>
  <script src="{{ url_for('static', filename='js/controls.js') }}"></script>
</body>
</html>
